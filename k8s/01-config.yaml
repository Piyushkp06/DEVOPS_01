apiVersion: v1
kind: Namespace
metadata:
  name: devops-platform
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: devops-config
  namespace: devops-platform
data:
  NODE_ENV: "production"
  PORT: "5000"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  REDIS_URL: "redis://redis-service:6379"
  NODE_BACKEND_URL: "http://node-backend-service:5000/api"
---
apiVersion: v1
kind: Secret
metadata:
  name: devops-secrets
  namespace: devops-platform
type: Opaque
stringData:
  POSTGRES_DB: "devops_db"
  POSTGRES_USER: "devops_user"
  POSTGRES_PASSWORD: "devops_password"
  DATABASE_URL: "postgresql://devops_user:devops_password@postgres-service:5432/devops_db?schema=public"
  JWT_KEY: "your-super-secret-jwt-key-here"
  ACCESS_TOKEN_SECRET: "your-access-token-secret-here"
  REFRESH_TOKEN_SECRET: "your-refresh-token-secret-here"
