apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-backend
  namespace: devops-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: node-backend
  template:
    metadata:
      labels:
        app: node-backend
    spec:
      containers:
      - name: node-backend
        image: devops-node-backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000
        envFrom:
        - configMapRef:
            name: devops-config
        - secretRef:
            name: devops-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: node-backend-service
  namespace: devops-platform
spec:
  type: ClusterIP
  ports:
  - port: 5000
    targetPort: 5000
  selector:
    app: node-backend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-backend
  namespace: devops-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: python-backend
  template:
    metadata:
      labels:
        app: python-backend
    spec:
      containers:
      - name: python-backend
        image: devops-python-backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: devops-config
        - secretRef:
            name: devops-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: python-backend-service
  namespace: devops-platform
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
  selector:
    app: python-backend