{{- if .Values.monitoring.enabled }}
# ── Monitoring Namespace ─────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    {{- include "devops.labels" . | nindent 4 }}
---
# ── Prometheus ConfigMap ─────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    alerting:
      alertmanagers:
        - static_configs:
            - targets: ['alertmanager-service.monitoring.svc.cluster.local:9093']

    rule_files:
      - "/etc/prometheus/rules.yml"

    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
      - job_name: 'node-backend'
        metrics_path: '/metrics'
        static_configs:
          - targets: ['node-backend-service.{{ include "devops.namespace" . }}.svc.cluster.local:5000']
      - job_name: 'python-backend'
        metrics_path: '/metrics'
        static_configs:
          - targets: ['python-backend-service.{{ include "devops.namespace" . }}.svc.cluster.local:8000']
  rules.yml: |
    groups:
      - name: devops-alerts
        rules:
          - alert: HighErrorRate
            expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: High Error Rate detected
              description: "5xx error rate > 5% over 5m."
          - alert: BackendDown
            expr: up == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: Backend service is down
---
# ── Alertmanager ConfigMap ───────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: monitoring
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname', 'service']
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 1h
      receiver: 'node-backend-webhook'
    receivers:
    - name: 'node-backend-webhook'
      webhook_configs:
      - url: 'http://node-backend-service.{{ include "devops.namespace" . }}.svc.cluster.local:5000/api/incidents/webhook/alertmanager'
---
# ── Alertmanager ─────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      containers:
        - name: alertmanager
          image: {{ .Values.monitoring.alertmanager.image }}
          ports:
            - containerPort: 9093
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager/
      volumes:
        - name: config
          configMap:
            name: alertmanager-config
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager-service
  namespace: monitoring
spec:
  ports:
    - port: 9093
      targetPort: 9093
  selector:
    app: alertmanager
---
# ── Prometheus ───────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: {{ .Values.monitoring.prometheus.image }}
          ports:
            - containerPort: 9090
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/
      volumes:
        - name: config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-service
  namespace: monitoring
spec:
  type: NodePort
  ports:
    - port: 9090
      targetPort: 9090
      nodePort: 30090
  selector:
    app: prometheus
---
# ── Grafana ──────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: {{ .Values.monitoring.grafana.image }}
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: {{ .Values.monitoring.grafana.adminUser | quote }}
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: {{ .Values.monitoring.grafana.adminPassword | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-service
  namespace: monitoring
spec:
  type: NodePort
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30001
  selector:
    app: grafana
{{- end }}
