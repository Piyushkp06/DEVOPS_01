{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: devops-ingress
  namespace: {{ include "devops.namespace" . }}
  labels:
    {{- include "devops.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: devops-tls
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          # Frontend — catch-all
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 3000
          # Node.js API
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: node-backend-service
                port:
                  number: 5000
          # Python AI API
          - path: /api/ai
            pathType: Prefix
            backend:
              service:
                name: python-backend-service
                port:
                  number: 8000
{{- end }}
