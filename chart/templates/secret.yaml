apiVersion: v1
kind: Secret
metadata:
  name: devops-secrets
  namespace: {{ include "devops.namespace" . }}
  labels:
    {{- include "devops.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_DB: {{ .Values.postgres.database | quote }}
  POSTGRES_USER: {{ .Values.postgres.user | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgres.password | quote }}
  DATABASE_URL: {{ include "devops.databaseUrl" . | quote }}
  JWT_KEY: {{ .Values.secrets.jwtKey | quote }}
  ACCESS_TOKEN_SECRET: {{ .Values.secrets.accessTokenSecret | quote }}
  REFRESH_TOKEN_SECRET: {{ .Values.secrets.refreshTokenSecret | quote }}
  GROQ_API_KEY: {{ .Values.ai.groqApiKey | quote }}
