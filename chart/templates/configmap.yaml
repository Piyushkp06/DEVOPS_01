apiVersion: v1
kind: ConfigMap
metadata:
  name: devops-config
  namespace: {{ include "devops.namespace" . }}
  labels:
    {{- include "devops.labels" . | nindent 4 }}
data:
  NODE_ENV: "production"
  PORT: "5000"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  REDIS_URL: "redis://redis-service:6379"
  NODE_BACKEND_URL: "http://node-backend-service:5000/api"
  KAFKA_BROKERS: "kafka-service:9092"
