# ── Node.js Backend Deployment ────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-backend
  namespace: {{ include "devops.namespace" . }}
  labels:
    {{- include "devops.labels" . | nindent 4 }}
    {{- include "devops.selectorLabels" (dict "component" "node-backend") | nindent 4 }}
spec:
  replicas: {{ .Values.replicas.nodeBackend }}
  selector:
    matchLabels:
      {{- include "devops.selectorLabels" (dict "component" "node-backend") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "devops.selectorLabels" (dict "component" "node-backend") | nindent 8 }}
    spec:
      {{- if .Values.rbac.create }}
      serviceAccountName: devops-platform-sa
      {{- end }}
      containers:
        - name: node-backend
          image: "{{ .Values.images.nodeBackend.repository }}:{{ .Values.images.nodeBackend.tag }}"
          imagePullPolicy: {{ .Values.images.nodeBackend.pullPolicy }}
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: devops-config
            - secretRef:
                name: devops-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
# ── Node.js Backend Service ──────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: node-backend-service
  namespace: {{ include "devops.namespace" . }}
  labels:
    {{- include "devops.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 5000
      targetPort: 5000
  selector:
    {{- include "devops.selectorLabels" (dict "component" "node-backend") | nindent 4 }}
